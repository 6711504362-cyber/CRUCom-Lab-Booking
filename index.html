<!doctype html>
<html lang="th" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Resource Booking</title>
    
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-full">
    <div id="app" class="h-full w-full dreamy-bg overflow-auto scrollbar-hide">
        <div class="floating-orb orb-1"></div>
        <div class="floating-orb orb-2"></div>
        <div class="floating-orb orb-3"></div>
        
        <div id="toast-container"></div>

        <div id="page-login" class="h-full w-full flex items-center justify-center p-4">
            <div class="glass-card rounded-3xl p-8 md:p-10 w-full max-w-md relative animate-scale-in">
                <div class="text-center mb-8">
                    <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-amber-300 to-amber-500 flex items-center justify-center shadow-lg animate-fade-in-up">
                        <i data-lucide="sparkles" class="w-8 h-8 text-white"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-gray-800 animate-fade-in-up delay-1">Smart Resource Booking</h1>
                    <p class="text-gray-500 mt-2 text-sm animate-fade-in-up delay-2">Welcome Back, Dreamer ✨</p>
                </div>
                <form id="login-form" class="space-y-5" onsubmit="return false;">
                    <div class="animate-fade-in-up delay-2">
                        <label for="login-sid" class="block text-sm font-medium text-gray-600 mb-1.5">รหัสนักศึกษา</label>
                        <div class="relative">
                            <i data-lucide="user" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-amber-400"></i> 
                            <input id="login-sid" type="text" placeholder="เช่น 65012345" class="input-dreamy w-full pl-10 pr-4 py-3 rounded-xl text-sm" required>
                        </div>
                    </div>
                    <div class="animate-fade-in-up delay-3">
                        <label for="login-pass" class="block text-sm font-medium text-gray-600 mb-1.5">รหัสผ่าน</label>
                        <div class="relative"> <i data-lucide="lock" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-amber-400"></i> 
                            <input id="login-pass" type="password" placeholder="••••••••" class="input-dreamy w-full pl-10 pr-4 py-3 rounded-xl text-sm" required>
                        </div>
                    </div>
                    <div class="flex items-center justify-between animate-fade-in-up delay-4">
                        <label class="flex items-center gap-2 cursor-pointer"> 
                            <input type="checkbox" class="w-4 h-4 rounded accent-amber-400"> 
                            <span class="text-xs text-gray-500">จดจำฉัน</span> 
                        </label> 
                        <button type="button" class="text-xs text-amber-500 hover:text-amber-600 transition">ลืมรหัสผ่าน?</button>
                    </div>
                    <button type="submit" id="btn-login" class="btn-golden w-full py-3.5 rounded-xl text-white font-semibold text-sm shadow-lg animate-fade-in-up delay-5"> เข้าสู่ระบบ </button>
                </form>
                <p class="text-center text-xs text-gray-400 mt-6 animate-fade-in-up delay-6">ยังไม่มีบัญชี? <button id="goto-register" type="button" class="text-amber-500 font-semibold hover:text-amber-600 transition">ลงทะเบียน</button></p>
            </div>
        </div>

        </div> <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script src="script.js"></script>
</body>
</html>
